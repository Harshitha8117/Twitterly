{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Twitterly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
  <style>
    body { background: #0f1419; }
    .admin-login-card {
      background: white;
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .admin-badge {
      background: linear-gradient(135deg, #f4212e, #ff6b6b);
      color: white;
      border-radius: 12px;
      padding: 12px 20px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      font-weight: 700;
      font-size: 15px;
    }
  </style>
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">

    <div class="text-center mb-4">
      <div class="admin-badge">
        <i class="fas fa-shield-alt fa-lg"></i>
        Admin Portal
      </div>
      <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="#1DA1F2">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.738-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        <span class="fw-800 fs-4" style="color:#1DA1F2">Twitterly</span>
      </div>
      <p class="text-muted">Sign in with your administrator account</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger rounded-3">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% if error %}
      <div class="alert alert-danger rounded-3">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
      </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-600">Username</label>
        <input type="text" name="username" class="form-control form-control-lg rounded-3"
          placeholder="Admin username" required autofocus/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Password</label>
        <input type="password" name="password" class="form-control form-control-lg rounded-3"
          placeholder="Password" required/>
      </div>
      <button type="submit" class="btn btn-danger w-100 py-3 rounded-pill fw-700 fs-6 mb-3">
        <i class="fas fa-shield-alt me-2"></i>Sign in to Admin Portal
      </button>
    </form>

    <div class="text-center">
      <a href="{% url 'login' %}" class="text-muted text-decoration-none small">
        <i class="fas fa-arrow-left me-1"></i>Back to Twitterly
      </a>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
