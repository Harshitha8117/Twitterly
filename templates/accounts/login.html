{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Twitterly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="text-center mb-4">
      <svg viewBox="0 0 24 24" width="42" height="42" fill="#1DA1F2">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.738-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <h2 class="fw-800 mt-2" style="color:#1DA1F2">Twitterly</h2>
    </div>

    <h1 class="auth-title">Sign in</h1>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger rounded-3">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-600">Username</label>
        {{ form.username }}
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn-auth-primary mb-3">Sign in</button>
    </form>

    <div class="text-center mb-4">
      <span class="text-muted">Don't have an account?</span>
      <a href="{% url 'register' %}" class="text-twitter fw-700 ms-1">Sign up</a>
    </div>

    <!-- Admin Portal Link -->
    <div class="text-center mt-3 pt-3 border-top">
      <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-danger rounded-pill px-4 fw-600">
        <i class="fas fa-shield-alt me-2"></i>Admin Portal Login
      </a>
      <p class="text-muted small mt-2">For administrators only</p>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
